<meta charset="utf-8"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0A0E1A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#F1F5F9;overflow-x:hidden}
.page{display:none;flex-direction:column;align-items:center;padding:0 16px 100px;min-height:100vh}
.page.active{display:flex}
h1{font-size:24px;font-weight:800;text-align:center;margin-top:52px;margin-bottom:6px}
.sub{font-size:15px;color:#94A3B8;text-align:center;margin-bottom:20px}
.preview-card{background:#111827;border:1px solid #1A2235;border-radius:18px;padding:24px 40px;display:flex;flex-direction:column;align-items:center;margin-bottom:16px;width:100%;max-width:420px}
.animal-circle{width:96px;height:96px;border-radius:50%;border:2px solid #00B3E6;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.animal-circle span{font-size:52px;line-height:1}
.preview-name{margin-top:12px;font-size:16px;font-weight:600;color:#F1F5F9}

/* ── Search bar ── */
.search-wrap{width:100%;max-width:420px;margin-bottom:14px;position:relative}
.search-input{width:100%;padding:13px 16px 13px 44px;background:#111827;border:1.5px solid #1A2235;border-radius:13px;font-size:15px;color:#F1F5F9;outline:none;transition:border-color 0.15s}
.search-input::placeholder{color:#475569}
.search-input:focus{border-color:#00B3E6}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;font-size:18px;cursor:pointer;padding:4px;display:none}
.search-clear.visible{display:block}

/* ── Sections ── */
.section{width:100%;max-width:420px;background:#111827;border:1px solid #1A2235;border-radius:14px;padding:16px;margin-bottom:14px}
.section-label{font-size:13px;font-weight:600;color:#94A3B8;margin-bottom:12px}
.swatches{display:flex;flex-wrap:wrap;gap:10px}
.swatch{width:40px;height:40px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.12s,border-color 0.12s;flex-shrink:0}
.swatch.active{border-color:#00B3E6;transform:scale(1.18)}

/* ── Animal grid ── */
.grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.tile{width:58px;height:58px;border-radius:12px;background:#1A2235;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:30px;transition:border-color 0.12s,background 0.12s,transform 0.12s;user-select:none}
.tile.active{border-color:#00B3E6;background:rgba(0,179,230,0.15);transform:scale(1.1)}
.cat-label{width:100%;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.08em;margin-top:8px;margin-bottom:2px}

/* ── Search results count ── */
.result-count{font-size:12px;color:#475569;width:100%;max-width:420px;margin-bottom:8px;text-align:center}

/* ── No results ── */
.no-results{color:#475569;font-size:15px;text-align:center;padding:24px 0;width:100%}

/* ── Nav / buttons ── */
.btn{display:block;width:100%;max-width:420px;padding:17px;border-radius:13px;border:none;background:linear-gradient(90deg,#00B3E6,#0096C7);color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity 0.15s;text-align:center}
.btn:active{opacity:0.85}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.nav-row{display:flex;width:100%;max-width:420px;margin-top:10px;margin-bottom:4px}
.nav-btn{display:flex;align-items:center;gap:8px;background:#111827;border:1px solid #1A2235;border-radius:13px;padding:14px 20px;cursor:pointer;font-size:15px;font-weight:600;color:#94A3B8;transition:border-color 0.12s,color 0.12s;flex:1;justify-content:center}
.nav-btn:hover{border-color:#00B3E6;color:#00B3E6}
.nav-arrow{font-size:20px}
</style>
</head>

<!-- ══════════════════════════════════════════════════════════ PAGE 1 -->
<div class="page active" id="page1">
  <h1>Choose Your Animal</h1>
  <p class="sub" id="sub1">Pick an animal and background to represent you</p>

  <div class="preview-card">
    <div class="animal-circle" id="previewCircle" style="background:#1A2235">
      <span id="previewEmoji">🐶</span>
    </div>
    <div class="preview-name" id="previewName">Player</div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search animals…" oninput="onSearch(this.value)" autocomplete="off" spellcheck="false"/>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <!-- Search results (shown when searching) -->
  <div id="searchResults" style="display:none;width:100%;max-width:420px">
    <div class="result-count" id="resultCount"></div>
    <div class="section">
      <div class="grid" id="searchGrid"></div>
      <div class="no-results" id="noResults" style="display:none">No animals found 🤔</div>
    </div>
  </div>

  <!-- Normal layout (hidden when searching) -->
  <div id="normalLayout" style="width:100%;max-width:420px">
    <div class="section">
      <div class="section-label">Background Colour</div>
      <div class="swatches" id="bgSwatches"></div>
    </div>
    <div class="section">
      <div class="section-label">Popular Animals</div>
      <div class="grid" id="grid1"></div>
    </div>
    <div class="nav-row">
      <div class="nav-btn" onclick="goPage(2)">
        <span>More Animals</span><span class="nav-arrow">→</span>
      </div>
    </div>
  </div>

  <button class="btn" id="doneBtn1" onclick="finish()">Let's Go →</button>
</div>

// ── Load existing config ────────────────────────────────────────────────────
function applyConfig(cfg,name){
  if(name)['previewName','previewName2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=name;});
  if(cfg?.animal&&ANIMALS_DATA.some(a=>a[0]===cfg.animal)){selected=cfg.animal;}
  if(cfg?.bgColor){bgColor=cfg.bgColor;}
}
try{
  const m=JSON.parse(localStorage.getItem('capitalquest_mock_db')||'{}');
  const uid=localStorage.getItem('capitalquest_current_user');
  if(uid&&m.users?.[uid])applyConfig(m.users[uid].avatarConfig,m.users[uid].username);
}catch(e){}

  ['doneBtn1','doneBtn2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='Save Changes';});
  const s=document.getElementById('sub1');if(s)s.textContent='Update your animal and background';
  auth.onAuthStateChanged(async u=>{
    if(!u)return;
    try{
      const snap=await db.collection('users').doc(u.uid).get();
      if(snap.exists)applyConfig(snap.data().avatarConfig,snap.data().username);
      updatePreviews();buildGrids();
    }catch(e){}
  });
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function updatePreviews(){
  const circles=['previewCircle','previewCircle2'];
  const emojis=['previewEmoji','previewEmoji2'];
  circles.forEach(id=>{const el=document.getElementById(id);if(el)el.style.background=bgColor;});
  emojis.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=selected;});
  document.querySelectorAll('.tile').forEach(el=>el.classList.toggle('active',el.dataset.emoji===selected));
  document.querySelectorAll('#bgSwatches .swatch').forEach(el=>el.classList.toggle('active',el.dataset.hex===bgColor));
}
function makeTile(emoji){
  const t=document.createElement('div');
  t.className='tile'+(emoji===selected?' active':'');
  t.textContent=emoji;
  t.dataset.emoji=emoji;
  t.onclick=()=>{selected=emoji;updatePreviews();};
  return t;
}

// ── Build BG swatches ───────────────────────────────────────────────────────
function buildBg(){
  const el=document.getElementById('bgSwatches');
  el.innerHTML='';
  BG_COLORS.forEach(hex=>{
    const s=document.createElement('div');
    s.className='swatch'+(hex===bgColor?' active':'');
    s.style.background=hex;
    s.dataset.hex=hex;
    s.onclick=()=>{bgColor=hex;updatePreviews();};
    el.appendChild(s);
  });
}

// ── Build grids ─────────────────────────────────────────────────────────────
function buildGrids(){
  // Page 1
  const g1=document.getElementById('grid1');
  g1.innerHTML='';
  PAGE1_EMOJIS.forEach(e=>g1.appendChild(makeTile(e)));

  // Page 2 with category labels
  const g2=document.getElementById('grid2');
  g2.innerHTML='';
  const p2map={};
  PAGE2_ANIMALS.forEach(a=>p2map[a[0]]=true);
  PAGE2_GROUPS.forEach(({label,emojis})=>{
    const available=emojis.filter(e=>p2map[e]||!PAGE1_SET.has(e));
    if(!available.length)return;
    const lbl=document.createElement('div');
    lbl.className='cat-label';lbl.textContent=label;g2.appendChild(lbl);
    available.forEach(e=>g2.appendChild(makeTile(e)));
  });
  const p2el=document.getElementById('p2Count');
  if(p2el)p2el.textContent=PAGE2_ANIMALS.length+' more animals';
}

  const trimmed=q.trim().toLowerCase();
  const clearBtn=document.getElementById('searchClear');
  const searchRes=document.getElementById('searchResults');
  const normalLayout=document.getElementById('normalLayout');
  const navRow=document.querySelector('.nav-row');

  clearBtn.classList.toggle('visible',trimmed.length>0);

  if(!trimmed){
    searchRes.style.display='none';
    normalLayout.style.display='';
    updatePreviews();
    return;
  }

  searchRes.style.display='';
  normalLayout.style.display='none';

  const matches=ANIMALS_DATA.filter(([emoji,kw])=>kw.includes(trimmed)||emoji===trimmed);
  const grid=document.getElementById('searchGrid');
  const noRes=document.getElementById('noResults');
  const count=document.getElementById('resultCount');

  grid.innerHTML='';
  if(matches.length===0){
    noRes.style.display='';
    count.textContent='';
  }else{
    noRes.style.display='none';
    count.textContent=matches.length+' animal'+(matches.length===1?'':'s')+' found';
    matches.forEach(([emoji])=>grid.appendChild(makeTile(emoji)));
  }
}

function clearSearch(){
  const input=document.getElementById('searchInput');
  input.value='';
  onSearch('');
  input.focus();
}

// ── Page nav ────────────────────────────────────────────────────────────────
function goPage(n){
  document.getElementById('page1').classList.toggle('active',n===1);
  document.getElementById('page2').classList.toggle('active',n===2);
  window.scrollTo(0,0);
  if(n===1){const inp=document.getElementById('searchInput');if(inp)inp.focus();}
}

// ── Save ────────────────────────────────────────────────────────────────────
async function finish(){
  ['doneBtn1','doneBtn2'].forEach(id=>{const el=document.getElementById(id);if(el){el.disabled=true;el.textContent='Saving…';}});
  const avatarConfig={animal:selected,bgColor};
  if(isEmbed){
    if(currentUser){
      try{await db.collection('users').doc(currentUser.uid).update({avatarConfig,welcomeShown:true});}
      catch(e){localStorage.setItem('pendingAvatarConfig',JSON.stringify(avatarConfig));}
    }
    window.parent.postMessage({type:'avatarSaved',config:avatarConfig},'*');
  }else if(fromProfile&&currentUser){
    try{await db.collection('users').doc(currentUser.uid).update({avatarConfig});}
    catch(e){localStorage.setItem('pendingAvatarConfig',JSON.stringify(avatarConfig));}
    window.location.href='/';
  }else{
    localStorage.setItem('pendingAvatarConfig',JSON.stringify(avatarConfig));
    window.location.href='/setup';
  }
}

// ── Init ────────────────────────────────────────────────────────────────────
buildBg();
buildGrids();
updatePreviews();
</script>
</body>
</html>
