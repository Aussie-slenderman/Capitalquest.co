<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Choose Your Animal — CapitalQuest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0E1A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#F1F5F9;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;padding:0 16px 80px;overflow-y:auto}
h1{font-size:24px;font-weight:800;text-align:center;margin-top:52px;margin-bottom:6px}
.sub{font-size:15px;color:#94A3B8;text-align:center;margin-bottom:28px}
.preview-card{background:#111827;border:1px solid #1A2235;border-radius:18px;padding:28px 40px;display:flex;flex-direction:column;align-items:center;margin-bottom:28px;width:100%;max-width:420px}
.animal-circle{width:96px;height:96px;border-radius:50%;background:#1A2235;border:2px solid #00B3E6;display:flex;align-items:center;justify-content:center}
.animal-circle span{font-size:52px;line-height:1}
.preview-name{margin-top:14px;font-size:16px;font-weight:600;color:#F1F5F9}
.section{width:100%;max-width:420px;margin-bottom:20px}
.section-label{font-size:13px;font-weight:600;color:#94A3B8;margin-bottom:10px}
.grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.tile{width:60px;height:60px;border-radius:12px;background:#111827;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:32px;transition:border-color 0.12s,background 0.12s,transform 0.12s}
.tile.active{border-color:#00B3E6;background:rgba(0,179,230,0.15);transform:scale(1.1)}
.btn{display:block;width:100%;max-width:420px;padding:17px;border-radius:13px;border:none;background:linear-gradient(90deg,#00B3E6,#0096C7);color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-top:12px;transition:opacity 0.15s}
.btn:active{opacity:0.85}
</style>
</head>
<body>
<h1>Choose Your Animal</h1>
<p class="sub">Pick an animal to represent you to other players</p>

<div class="preview-card">
  <div class="animal-circle">
    <span id="previewEmoji">🐶</span>
  </div>
  <div class="preview-name" id="previewName">Player</div>
</div>

<div class="section">
  <div class="section-label">Pick an Animal</div>
  <div class="grid" id="animalGrid"></div>
</div>

<button class="btn" onclick="finish()">Let's Go →</button>

<script>
const ANIMALS = [
  '🐶','🐱','🦁','🐯','🐻','🐼',
  '🦊','🐺','🐨','🦘','🐸','🐧',
  '🦅','🦉','🦄','🐉','🦈','🐙',
  '🐘','🦒','🦓','🦔','🦦','🦋',
];

let selected = ANIMALS[0];

// Get username from localStorage
try{
  const db=JSON.parse(localStorage.getItem('capitalquest_mock_db')||'{}');
  const users=db.users||{};
  const uid=localStorage.getItem('capitalquest_current_user');
  if(uid&&users[uid])document.getElementById('previewName').textContent=users[uid].username||'Player';
}catch(e){}

const grid=document.getElementById('animalGrid');
ANIMALS.forEach(emoji=>{
  const t=document.createElement('div');
  t.className='tile'+(emoji===selected?' active':'');
  t.textContent=emoji;
  t.onclick=()=>{
    selected=emoji;
    document.getElementById('previewEmoji').textContent=emoji;
    document.querySelectorAll('.tile').forEach(el=>el.classList.toggle('active',el.textContent===emoji));
  };
  grid.appendChild(t);
});

function finish(){
  const avatarConfig={animal:selected};
  localStorage.setItem('pendingAvatarConfig',JSON.stringify(avatarConfig));
  window.location.href='/setup';
}
</script>
</body>
</html>
