name: Weekly Portfolio Email (legacy — disabled)

# Legacy workflow that uses Gmail SMTP via an older copy of
# send-weekly-emails.js in .github/scripts/. The active workflow is
# weekly-email.yml which uses Resend + the rebranded script in
# scripts/. Schedule has been removed here so only the Resend-based
# workflow fires automatically; recipients won't get duplicate emails.
# Manual workflow_dispatch is kept in case Gmail SMTP needs to be
# used as a fallback.
on:
  workflow_dispatch:

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Send weekly portfolio emails
        working-directory: .github/scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node send-weekly-emails.js
