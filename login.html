<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
<title>Sign In — CapitalQuest</title>
<meta name="theme-color" content="#0A0E1A"/>
<style>
  html, body { height: 100%; margin: 0; background: #0A0E1A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  * { box-sizing: border-box; }
  .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .card { width: 100%; max-width: 440px; }
  .back { color: #00B3E6; font-size: 16px; text-decoration: none; margin-bottom: 32px; display: inline-block; }
  h1 { color: #F1F5F9; font-size: 28px; font-weight: 800; margin: 0 0 6px; }
  .sub { color: #94A3B8; font-size: 16px; margin: 0 0 28px; }
  label { color: #94A3B8; font-size: 14px; font-weight: 500; display: block; margin-bottom: 6px; }
  input { width: 100%; background: #1A2235; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 16px; color: #F1F5F9; font-size: 16px; outline: none; margin-bottom: 16px; }
  input::placeholder { color: #64748B; }
  input:focus { border-color: #00B3E6; }
  .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(90deg, #00B3E6, #0096C7); color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { background: rgba(255,61,87,0.12); border: 1px solid #FF3D57; border-radius: 12px; padding: 12px; margin-bottom: 16px; color: #FF3D57; font-size: 14px; display: none; }
  .link { text-align: center; margin-top: 16px; color: #94A3B8; font-size: 16px; }
  .link a { color: #00B3E6; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <a class="back" href="/welcome">&larr; Back</a>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to your CapitalQuest account</p>
    <div class="error" id="err"></div>
    <label>Username</label>
    <input type="text" id="user" placeholder="your_username" autocapitalize="none" autocomplete="username"/>
    <label>Password</label>
    <input type="password" id="pass" placeholder="••••••••"/>
    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <p class="link">Don't have an account? <a href="/register">Sign up</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:'AIzaSyCP1AcnDTU2umjR3cGycRxQ5mwOFq4Xjgg',
  authDomain:'capitalquest-4d20b.firebaseapp.com',
  projectId:'capitalquest-4d20b',
  appId:'1:407589569541:web:3b8a543f03ad9f110ec86c'
});
var auth=firebase.auth();
var db=firebase.firestore();

// If already signed in, go straight to dashboard
auth.onAuthStateChanged(function(u){
  if(u) window.location.href='/dashboard';
});

async function doLogin(){
  var errEl=document.getElementById('err');
  var btn=document.getElementById('btn');
  var username=document.getElementById('user').value.trim().toLowerCase();
  var password=document.getElementById('pass').value;
  errEl.style.display='none';
  if(!username){errEl.textContent='Please enter your username.';errEl.style.display='block';return;}
  if(!password){errEl.textContent='Please enter your password.';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing In...';
  try{
    var email=username;
    if(username.indexOf('@')===-1){
      var snap=await db.collection('users').where('username','==',username).get();
      if(snap.empty)throw{message:'No account found with that username.'};
      email=snap.docs[0].data().email;
      if(!email)throw{message:'Account has no email on file.'};
    }
    await auth.signInWithEmailAndPassword(email,password);
    // Wait for Firebase to persist auth token to IndexedDB before navigating
    await auth.currentUser.getIdToken(true);
    await new Promise(function(r){setTimeout(r,1000);});
    window.location.href='/dashboard';
  }catch(e){
    errEl.textContent=e.message||'Invalid username or password.';
    errEl.style.display='block';
    btn.disabled=false;btn.textContent='Sign In';
  }
}
// Allow Enter key to submit
document.getElementById('pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('user').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('pass').focus();});
</script>
</body>
</html>
